[direnv]
disabled = false
style = "bg:surface0 fg:yellow"
symbol = ".¾░Æō"
allowed_msg = "’ģż"
not_allowed_msg = "’ü▒"
denied_msg = "’ü×"
loaded_msg = "’äŠ"
unloaded_msg = "’ĆŻ"
detect_files = [ ".envrc" ]
format = "[ $symbol $loaded/$allowed ]($style)"

[custom.distrobox]
disabled = false
description = "Indicate if inside distrobox"
when = "test -f /run/.containerenv || test -f /.dockerenv"
command = "echo \"’ÆĘ [$CONTAINER_ID]\""
