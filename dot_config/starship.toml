# Use the color palette
palette = "catppuccin_mocha"

format = """
$os${custom.distrobox} ([($username)($sudo)($hostname)](bg:surface0) )$directory( $direnv)( $cmd_duration)\
(
[ Ņ£ź ](bg:surface0 fg:text) $git_branch$git_metrics $git_status\
)
([ $shell](bg:surface0) )[$status](bg:surface0) \
"""

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:red fg:text"
format = "[ $user ]($style)"
disabled = false

[hostname]
ssh_symbol = "[Ņ¼ü](bg:surface0 fg:sky)"
ssh_only = true
style = "bg:surface0 fg:maroon"
format = "[on $ssh_symbol ¾░ģü[$hostname](bg:surface0 fg:red bold)¾░ģé ]($style)"
disabled = false

[os]
style = "bg:surface0 fg:text"
disabled = false
format = "[ $symbol ]($style)"
[os.symbols]
Alpine = "’īĆ"
Android = "’ģ╗"
Arch = "’īā"
Debian = "Ņśŗ"
Fedora = "’×ś"
Linux = "¾░īĮ"
Mint = "’īÄ"
openSUSE = "’¤¢"
Ubuntu = "’¤¤"
Unknown = "¾░ŗ¢"

[sudo]
style = "bg:surface0 fg:pink bold"
symbol = "’āÉ"
disabled = false
allow_windows = true
format = "[as $symbol ]($style)"

[directory]
style = "bg:surface0 fg:lavender"
before_repo_root_style = "bg:surface0 fg:blue italic"
repo_root_style = "bg:surface0 fg:flamingo"
read_only_style = "bg:surface0 fg:red"
format = "[ $read_only]($read_only_style)[$path ]($style)"
repo_root_format = "[ $read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)"
truncation_length = 5
truncation_symbol = "ŌĆ”/"
truncate_to_repo = false
read_only = "¾░īŠ"
home_symbol = "¾░ŗ£"

[directory.substitutions]
".config" = ".¾░Æō"
"Documents" = "¾░łÖ"
"Downloads" = "’ĆÖ"
"wgits" = "Ņ£ź"
"gits" = "Ņ£ź"
"home/" = "¾░ŗ£/"
"Music" = "’Ćü"
"Pictures" = "’ĆŠ"

[git_branch]
style = "bg:surface0 fg:rosewater"
format = "[ $branch ]($style)"

[git_status]
style = "bg:surface0 fg:flamingo"
conflicted = "[¾░×ć](bg:surface0 fg:red) "
up_to_date = "[’Ćī](bg:surface0 fg:green) "
untracked = "[’ü░](bg:surface0 fg:overlay1) "
stashed = "Ņ¼® "
modified = "¾▒ōź "
staged = "[¾▒½ē\\($count\\)](basen) "
renamed = "’üĆ "
deleted = "’ćĖ "
ahead = "[’üó](bg:surface0 fg:green)${count} "
diverged = "[’üó](bg:surface0 fg:green)${ahead_count}[’üŻ](bg:surface0 fg:red)${behind_count} "
behind = "[’üŻ](bg:surface0 fg:red)${count} "
format = "[ $all_status$ahead_behind]($style)"

[git_metrics]
disabled = false
deleted_style = "bg:surface0 fg:red"
added_style = "bg:surface0 fg:green"
format = "([’ü¦$added ]($added_style))([’ü©$deleted ]($deleted_style))"

[cmd_duration]
min_time = 1_000
min_time_to_notify = 30_000
show_milliseconds = true
disabled = false
style = "bg:surface0 fg:teal"
show_notifications = true
format = "[ ¾░ģÆ $duration ]($style)"

[status]
disabled = false
symbol = "[ ¾░Üī ](bg:red fg:base)"
