# lima.yaml — VM для безопасного запуска Codex CLI
#
# Идея: Codex CLI работает внутри VM и не имеет прямого доступа
# к файлам хоста, кроме явно смонтированных проектных каталогов.
#
# Запуск:
#   limactl start --name=codex ./codex.yaml
#   limactl shell codex codex
#
# Альтернатива с --mount-only (Lima >= 2.0), без правки yaml:
#   limactl start --mount-only $(pwd):w --name=codex ./codex.yaml

minimumLimaVersion: 2.0.0

# ---- Базовый образ ----------------------------------------------------------
# Общая база для AI-агентов: Ubuntu + Linuxbrew + Node.js/npm + базовые утилиты.
base: agent-brew.yaml

firmware:
  images:
    - location: "/home/linuxbrew/.linuxbrew/share/qemu/edk2-x86_64-code.fd"
      arch: "x86_64"

# ---- Ресурсы VM -------------------------------------------------------------
# Codex CLI требует минимум 4 GiB RAM; 6 GiB — запас для крупных репозиториев
# и тяжёлых задач (компиляция, индексирование).
cpus: 4
memory: "6GiB"
disk: "40GiB"

# ---- Монтирование -----------------------------------------------------------
# КЛЮЧЕВОЙ МОМЕНТ БЕЗОПАСНОСТИ.
# В VM монтируется только то, что реально нужно агенту.
# Проектные каталоги хоста доступны на запись; конфиги — только для чтения.
#
# Замените location на путь к вашему проекту, либо запускайте с флагом
# --mount-only (см. шапку файла).
mountTypesUnsupported: ["9p"]
mounts:
  - location: "~/.config/git"
    mountPoint: "/home/{{.User}}.guest/.config/git"
    writable: false
  - location: "~/.ssh/keys/"
    mountPoint: "/home/{{.User}}.guest/.ssh/keys"
    writable: false
  # Codex хранит конфиг и сессии в $CODEX_HOME (по умолчанию ~/.codex).
  # Монтируем на запись, чтобы настройки и auth-сессии сохранялись на хосте.
  - location: "~/.codex"
    mountPoint: "/home/{{.User}}.guest/.codex"
    writable: true
  - location: "~/gits"
    writable: true
  - location: "~/wgits"
    writable: true

# ---- Сеть -------------------------------------------------------------------
# Дефолтная user-mode сеть достаточна: Codex CLI обращается к api.openai.com
# и в npm registry.
networks: []

# ---- Provision --------------------------------------------------------------
provision:
  # Установка Codex CLI БЕЗ sudo.
  # npm prefix и PATH настроены в базовом шаблоне agent-brew.yaml.
  #    @openai/codex — тонкая обёртка над нативным бинарником; при первом
  #    запуске он скачивает платформенный бинарник в ~/.codex/.bin/.
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      export PATH="$HOME/.npm-global/bin:$PATH"

      if ! command -v codex >/dev/null 2>&1; then
        npm install -g @openai/codex
      fi

      command -v codex

# ---- Готовность -------------------------------------------------------------
probes:
  - description: "codex CLI installed (user-local npm prefix)"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      export PATH="$HOME/.npm-global/bin:$PATH"
      if ! timeout 120s bash -c '
        export PATH="$HOME/.npm-global/bin:$PATH"
        until command -v codex >/dev/null 2>&1; do sleep 3; done
      '; then
        echo >&2 "codex is not installed yet"
        exit 1
      fi
    hint: |
      Codex CLI не установился. Проверьте логи:
        limactl shell codex sudo journalctl -u cloud-final
        limactl shell codex cat /var/log/cloud-init-output.log
      И убедитесь, что ~/.npm-global/bin в PATH:
        limactl shell codex bash -lc 'echo $PATH; which codex'

# ---- Подсказка после старта -------------------------------------------------
message: |
  ✅ VM готова. Запуск Codex CLI:

      limactl shell {{.Name}} codex

  Аутентификация — через интерактивную сессию (первый запуск выполнит
  sign-in flow) либо переменной окружения:

      limactl shell {{.Name}}
      echo 'export OPENAI_API_KEY=sk-...' >> ~/.bash_profile

  Конфиг и сессии Codex сохраняются в ~/.codex/ (примонтирован с хоста,
  поэтому настройки переживают пересоздание VM).

  Linuxbrew доступен внутри VM:

      brew install jq

  Глобальные npm-пакеты устанавливаются БЕЗ sudo в ~/.npm-global.

  Проектный каталог хоста ({{.Dir}}) доступен внутри VM по тому же пути.

  Документация: https://github.com/openai/codex/tree/main/docs
