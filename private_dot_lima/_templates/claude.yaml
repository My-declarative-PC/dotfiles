# lima.yaml — VM для безопасного запуска Claude Code
# Основано на: https://lima-vm.io/docs/examples/ai/
#
# Идея: Claude Code работает внутри VM и не имеет прямого доступа
# к файлам хоста, кроме явно смонтированного проектного каталога.
#
# Запуск:
#   limactl start --name=claude ./claude-code.yaml
#   limactl shell claude claude
#
# Альтернатива с --mount-only (Lima >= 2.0), без правки yaml:
#   limactl start --mount-only $(pwd):w --name=claude ./claude-code.yaml

minimumLimaVersion: 2.0.0

# ---- Базовый образ ----------------------------------------------------------
# Общая база для AI-агентов: Ubuntu + Linuxbrew + Node.js/npm + базовые утилиты.
base: agent-brew.yaml

firmware:
  images:
    - location: "/home/linuxbrew/.linuxbrew/share/qemu/edk2-x86_64-code.fd"
      arch: "x86_64"

# ---- Ресурсы VM -------------------------------------------------------------
# Claude Code довольно лёгкий, но при работе с крупными репозиториями
# (например, индексирование, билды) полезно иметь запас.
cpus: 4
memory: "4GiB"
disk: "40GiB"

# ---- Монтирование -----------------------------------------------------------
# КЛЮЧЕВОЙ МОМЕНТ БЕЗОПАСНОСТИ.
# По рекомендации Lima, в VM монтируется ТОЛЬКО проектный каталог,
# чтобы агент не мог читать/писать/исполнять остальные файлы хоста.
#
# Замените location на путь к вашему проекту, либо запускайте с флагом
# --mount-only (см. шапку файла).
mountTypesUnsupported: ["9p"]
mounts:
  # Если хотите read-only режим — поставьте writable: false
  - location: "~/.config/git"
    mountPoint: "/home/{{.User}}.guest/.config/git"
    writable: false
  - location: "~/.ssh/keys/"
    mountPoint: "/home/{{.User}}.guest/.ssh/keys"
    writable: false
  - location: "~/.claude"
    mountPoint: "/home/{{.User}}.guest/.claude"
    writable: true
  - location: "~/gits"
    writable: true
  - location: "~/wgits"
    writable: true

# ---- Сеть -------------------------------------------------------------------
# Дефолтная user-mode сеть достаточна: Claude Code ходит на api.anthropic.com
# и в npm registry.
networks: []

# ---- Provision --------------------------------------------------------------
provision:
  # Установка Claude Code БЕЗ sudo.
  # npm prefix и PATH настроены в базовом шаблоне agent-brew.yaml.
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      export PATH="$HOME/.npm-global/bin:$PATH"

      if ! command -v claude >/dev/null 2>&1; then
        npm install -g @anthropic-ai/claude-code
      fi

      # Сообщим, где лежит бинарник — пригодится для отладки
      command -v claude

# ---- Готовность -------------------------------------------------------------
# Проба запускается от имени пользователя VM (Lima по умолчанию).
# Важно: явно подгружаем PATH, потому что probe не наследует .profile.
probes:
  - description: "claude-code CLI installed (user-local npm prefix)"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      export PATH="$HOME/.npm-global/bin:$PATH"
      if ! timeout 120s bash -c '
        export PATH="$HOME/.npm-global/bin:$PATH"
        until command -v claude >/dev/null 2>&1; do sleep 3; done
      '; then
        echo >&2 "claude is not installed yet"
        exit 1
      fi
    hint: |
      Claude Code не установился. Проверьте логи:
        limactl shell claude sudo journalctl -u cloud-final
        limactl shell claude cat /var/log/cloud-init-output.log
      И убедитесь, что ~/.npm-global/bin в PATH:
        limactl shell claude bash -lc 'echo $PATH; which claude'

# ---- Подсказка после старта -------------------------------------------------
message: |
  ✅ VM готова. Запуск Claude Code:

      limactl shell {{.Name}} claude

  Аутентификация — через интерактивную сессию (первый запуск)
  либо переменной окружения:

      limactl shell {{.Name}}
      echo 'export ANTHROPIC_API_KEY=sk-ant-...' >> ~/.bash_profile

  Linuxbrew доступен внутри VM:

      brew install jq

  Глобальные npm-пакеты устанавливаются БЕЗ sudo в ~/.npm-global.

  Проектный каталог хоста ({{.Dir}}) доступен внутри VM по тому же пути.

  Документация: https://lima-vm.io/docs/examples/ai/
